<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Details - MoodMate</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-shell">
        <header class="topbar">
            <button class="icon-btn menu-btn" aria-label="Open menu">☰</button>
            <div class="topbar-title">
                <span>Personal Profile</span>
                <small>Help MoodMate personalize your insights</small>
            </div>
            <button id="signOutBtn" class="icon-btn" title="Sign out">⎋</button>
        </header>

        <main class="page-grid single-column">
            <section class="card profile-card">
                <div class="section-header">
                    <h1>Personal Details</h1>
                </div>
                <p class="section-copy">Enter your information to make mood tracking more meaningful.</p>

                <form id="profileForm" action="#" method="POST" onsubmit="return false;">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Fahmi Rahman" required>

                    <label for="age">Age</label>
                    <input type="number" id="age" name="age" min="13" max="100" placeholder="28" required>

                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com">

                    <label for="goals">Wellness Goals</label>
                    <textarea id="goals" name="goals" rows="3" placeholder="I want to feel more calm and balanced."></textarea>

                    <button id="saveProfileBtn" class="primary-btn">Save Details</button>
                </form>
            </section>

            <section class="card profile-summary-card">
                <div class="section-header">
                    <h2>Saved Details</h2>
                </div>
                <div id="personalInfo" class="info-panel">
                    <p>No details saved yet.</p>
                </div>
            </section>

            <a href="index.html" class="link-button back-link">← Back to Mood Tracker</a>
        </main>
    </div>

    <script src="auth.js"></script>
    <script src="script.js"></script>
</body>
</html>
