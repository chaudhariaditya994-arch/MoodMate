<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - MoodMate</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div class="app-shell auth-shell">
        <header class="topbar">
            <div class="topbar-title">
                <span>Welcome Back</span>
                <small>Sign in to continue your MoodMate journey</small>
            </div>
        </header>

        <main class="page-grid single-column">
            <section class="card auth-card">
                <div class="section-header">
                    <h1>Sign In</h1>
                </div>
                <p class="section-copy">Use your email and password or continue with Google.</p>

                <form id="loginForm" onsubmit="return false;">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" name="email" placeholder="you@example.com" required>

                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" name="password" placeholder="Enter your password" required>

                    <button id="loginBtn" class="primary-btn">Sign In</button>
                </form>

                <div class="divider"><span>or</span></div>
                <div id="googleSignInBtn" class="google-button">Sign in with Google</div>

                <p class="auth-footer">New here? <a href="signup.html">Create an account</a></p>
            </section>
        </main>
    </div>

    <script src="auth.js"></script>
    <script src="script.js"></script>
</body>
</html>
